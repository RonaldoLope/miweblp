<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Tecnológico</title>

<style>
body{
margin:0;
font-family:Arial;
color:#fff;
overflow:hidden;
background:radial-gradient(circle,#0f2027,#203a43,#2c5364);
}

/* efecto tecnológico */
canvas{
position:fixed;
top:0;left:0;
z-index:-1;
}

header{
text-align:center;
padding:30px;
background:rgba(0,0,0,0.6);
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.folder{
padding:30px;
border-radius:15px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
cursor:pointer;
text-align:center;
transition:0.3s;
}
.folder:hover{transform:scale(1.05);}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
flex-direction:column;
}

.modal-content{
background:url('https://upload.wikimedia.org/wikipedia/commons/7/7e/Universidad_Nacional_del_Altiplano_Puno.jpg') center/cover;
padding:20px;
border-radius:10px;
width:90%;max-width:500px;
}

.preview div{
background:rgba(0,0,0,0.6);
padding:5px;
margin:5px;
display:flex;
justify-content:space-between;
}

button{
padding:5px 10px;
margin:2px;
border:none;
background:#00c6ff;
color:#fff;
cursor:pointer;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>Portafolio Académico Tecnológico</h1>
</header>

<div class="container" id="folders"></div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="title"></h2>

<input type="file" id="fileInput" multiple>
<input type="text" id="urlInput" placeholder="Pegar enlace">
<button onclick="addURL()">Agregar Link</button>

<div class="preview" id="preview"></div>

<button onclick="closeModal()">Cerrar</button>
</div>
</div>

<script>
// crear carpetas
const container = document.getElementById('folders');
for(let i=1;i<=10;i++){
let div=document.createElement('div');
div.className='folder';
div.innerText='Semestre '+i;
div.onclick=()=>openFolder(i);
container.appendChild(div);
}

let storage={};
let current=0;

function openFolder(n){
current=n;
document.getElementById('modal').style.display='flex';
document.getElementById('title').innerText='Semestre '+n;
render();
}

function closeModal(){
document.getElementById('modal').style.display='none';}

// subir archivos
fileInput.onchange=function(){
if(!storage[current]) storage[current]=[];
for(let f of this.files){
storage[current].push({name:f.name});
}
render();
}

function addURL(){
let url=urlInput.value;
if(!storage[current]) storage[current]=[];
storage[current].push({name:url,url:url});
urlInput.value='';
render();
}

function render(){
let p=preview;
p.innerHTML='';
if(storage[current]){
storage[current].forEach((f,i)=>{
let div=document.createElement('div');
div.innerHTML=`${f.name}
<button onclick="edit(${i})">✏️</button>
<button onclick="download(${i})">⬇️</button>
<button onclick="del(${i})">❌</button>`;
p.appendChild(div);
});
}
}

function edit(i){
let n=prompt('Nuevo nombre:',storage[current][i].name);
if(n) storage[current][i].name=n;
render();
}

function del(i){
storage[current].splice(i,1);
render();
}

function download(i){
let f=storage[current][i];
if(f.url) window.open(f.url);
else alert('Archivo local no descargable');
}

// fondo tecnológico tipo matrix
const c=document.getElementById('bg');
const ctx=c.getContext('2d');
c.width=window.innerWidth;
c.height=window.innerHeight;

let letters='01';
letters=letters.split('');

let fontSize=14;
let columns=c.width/fontSize;
let drops=[];

for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
ctx.fillStyle='rgba(0,0,0,0.05)';
ctx.fillRect(0,0,c.width,c.height);
ctx.fillStyle='#0f0';
ctx.font=fontSize+'px monospace';

for(let i=0;i<drops.length;i++){
let text=letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>c.height && Math.random()>0.975) drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);
</script>

</body>
</html>
